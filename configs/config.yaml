data:
  coco_dir: data/coco/images
  test_images:
    cat: data/test_cat.jpg
    dog: data/test_dog.jpg
  drift_data_dir: data/drift
  drift_data_path: data/drift/X_train.npy

model:
  clip: openai/clip-vit-large-patch14
  mlp_path: models/drift_mlp_coco.pt

cache:
  similarity_threshold: 0.90
  drift_threshold: 0.50

training:
  epochs: 50
  lr: 0.001
  batch_size: 64
  dropout: 0.2

benchmark:
  results_dir: results
  figures_dir: figures